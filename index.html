<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Procedural Story Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script defer src="main.js"></script>

</head>

<body>

<div class="app">

<header>

<h1>Procedural Story Generator</h1>

<p class="subtitle">
Interactive procedural text generation (Python running in the browser)
</p>

</header>


<div class="main">

<!-- CHAT -->

<div class="chatPanel">

<div id="chatLog"></div>

<div class="botStatus">

<img id="avatar" src="images/think.png">

<div id="typing" class="typing">Thinking...</div>

</div>

<div class="feedback">

<button onclick="feedback(true)">👍 Makes sense</button>

<button onclick="feedback(false)">👎 Nonsense</button>

</div>

</div>


<!-- CODE PANEL -->

<div class="codePanel">

<div class="codeHeader">

<span>Python generator</span>

<button onclick="toggleCode()">Show / Hide</button>

</div>

<pre id="codeBlock"></pre>

</div>

</div>

<footer>

Python executed client-side using Pyodide.

</footer>

</div>

</body>
</html>
